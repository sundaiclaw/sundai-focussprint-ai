<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FocusSprint AI</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    textarea { width: 100%; min-height: 90px; }
    button { margin-top: 10px; padding: 10px 14px; }
    pre { background: #f5f5f5; padding: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>FocusSprint AI</h1>
  <p>Turn a goal into a focused 25-minute sprint plan.</p>
  <textarea id="goal" placeholder="e.g., Build a Chrome extension settings page"></textarea>
  <br />
  <button onclick="generatePlan()">Generate Sprint Plan</button>
  <pre id="out"></pre>

  <script>
    async function generatePlan() {
      const goal = document.getElementById('goal').value.trim();
      const out = document.getElementById('out');
      if (!goal) { out.textContent = 'Please enter a goal.'; return; }
      const res = await fetch('/api/plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ goal })
      });
      const data = await res.json();
      if (!res.ok) { out.textContent = data.error || 'Error'; return; }
      out.textContent = [
        `Goal: ${data.goal}`,
        `Duration: ${data.duration}`,
        '',
        'Plan:',
        ...data.plan.map((p, i) => `${i+1}. ${p}`),
        '',
        `Success: ${data.successCriteria}`,
        '',
        `Reflection: ${data.reflection}`
      ].join('\n');
    }
  </script>
</body>
</html>
